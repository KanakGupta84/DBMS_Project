<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Policies | InsureWise</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <div id="global-header"></div>

    <main class="flex-grow max-w-[1200px] mx-auto px-6 lg:px-10 py-8">
        <!-- Page Heading -->
        <div class="mb-10 flex flex-col md:flex-row md:items-end md:justify-between gap-6 fade-in-up">
            <div>
                <h1 class="text-3xl font-bold mb-1 tracking-tight text-slate-900">My Purchased Policies</h1>
                <p class="text-slate-500 text-sm font-medium">All your active and expired insurance policies in one place.</p>
            </div>
            <div class="flex items-center gap-3">

                <a href="policies.html" class="px-5 py-3 bg-slate-900 text-white text-xs font-bold uppercase tracking-wider rounded-xl shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all whitespace-nowrap">
                    + Buy New Policy
                </a>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 fade-in-up" style="animation-delay: 0.05s;">
            <div class="animated-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Total Policies</p>
                <p id="stat-total" class="text-2xl font-bold text-slate-900">—</p>
            </div>
            <div class="animated-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Active</p>
                <p id="stat-active" class="text-2xl font-bold text-green-600">—</p>
            </div>
            <div class="animated-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Expired</p>
                <p id="stat-expired" class="text-2xl font-bold text-slate-400">—</p>
            </div>
            <div class="animated-card bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1">Total Premium / Month</p>
                <p id="stat-premium" class="text-2xl font-bold text-slate-900">—</p>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="flex items-center gap-2 mb-6 fade-in-up" style="animation-delay: 0.1s;">
            <button class="px-4 py-2 bg-slate-900 text-white text-xs font-bold uppercase tracking-wider rounded-lg shadow-sm" data-filter="all">All</button>
            <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 text-xs font-bold uppercase tracking-wider rounded-lg hover:bg-slate-50 transition-all" data-filter="active">Active</button>
            <button class="px-4 py-2 bg-white border border-slate-200 text-slate-600 text-xs font-bold uppercase tracking-wider rounded-lg hover:bg-slate-50 transition-all" data-filter="expired">Expired</button>
        </div>

        <!-- Policy Cards Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="policies-grid">
            <!-- Dynamic Data goes here -->
        </div>
    </main>

    <!-- Footer -->
   <footer class="mt-auto py-4 border-t border-slate-200">
        <div class="max-w-[1200px] mx-auto px-6 lg:px-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">© 2024 InsureWise Financial Group</p>
            <div class="flex gap-6">
                <a class="text-[10px] uppercase tracking-widest text-slate-400 hover:text-slate-900 font-bold" href="#">Privacy</a>
                <a class="text-[10px] uppercase tracking-widest text-slate-400 hover:text-slate-900 font-bold" href="#">Terms</a>
                <a class="text-[10px] uppercase tracking-widest text-slate-400 hover:text-slate-900 font-bold" href="#">Security</a>
            </div>
        </div>
    </footer>

    <script src="../js/global.js"></script>
    <script src="../js/my-policies.js"></script>
</body>
</html>
