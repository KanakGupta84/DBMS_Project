<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin: Add Plan | InsureWise</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="global-header"></div>
    
    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="mb-10 text-center fade-in-up">
            <span class="px-3 py-1 bg-slate-100 text-slate-900 font-bold text-[10px] uppercase tracking-widest rounded-full mb-3 inline-block border border-slate-200">Admin Control</span>
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Publish New Insurance Plan</h1>
            <p class="text-slate-500 font-medium">Add a new policy to the catalog. It will become instantly available to all customers.</p>
        </div>

        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm fade-in-up" style="animation-delay: 0.1s;">
            <form id="add-plan-form" class="space-y-6">
                <!-- Row 1 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Plan Name *</label>
                        <input type="text" id="plan-name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all" placeholder="e.g. Health Supreme Elite" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Type *</label>
                        <select id="plan-type" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all cursor-pointer" required>
                            <option value="health">Health Insurance</option>
                            <option value="motor">Motor Insurance</option>
                            <option value="life">Life Insurance</option>
                        </select>
                    </div>
                </div>

                <!-- Row 2 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Provider Name *</label>
                        <input type="text" id="plan-provider" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all" placeholder="e.g. Allianz" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Monthly Premium (₹) *</label>
                        <input type="number" id="plan-premium" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all" placeholder="e.g. 5000" required>
                    </div>
                </div>

                <!-- Row 3 -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Coverage Limit</label>
                        <input type="text" id="plan-coverage" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all" placeholder="e.g. ₹25L / Year">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Network</label>
                        <input type="text" id="plan-network" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all" placeholder="e.g. Global (Tier 1)">
                    </div>
                </div>
                
                <!-- Icon Row -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Card Icon</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center space-x-2 cursor-pointer p-3 border border-slate-200 rounded-xl hover:bg-slate-50 flex-1">
                            <input type="radio" name="plan-icon" value="medical_services" checked class="text-slate-900 focus:ring-slate-900">
                            <span class="material-symbols-outlined text-slate-400">medical_services</span>
                            <span class="text-sm font-bold text-slate-700">Health</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-3 border border-slate-200 rounded-xl hover:bg-slate-50 flex-1">
                            <input type="radio" name="plan-icon" value="family_restroom" class="text-slate-900 focus:ring-slate-900">
                            <span class="material-symbols-outlined text-slate-400">family_restroom</span>
                            <span class="text-sm font-bold text-slate-700">Life</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer p-3 border border-slate-200 rounded-xl hover:bg-slate-50 flex-1">
                            <input type="radio" name="plan-icon" value="directions_car" class="text-slate-900 focus:ring-slate-900">
                            <span class="material-symbols-outlined text-slate-400">directions_car</span>
                            <span class="text-sm font-bold text-slate-700">Car</span>
                        </label>
                    </div>
                </div>

                <!-- Row 4 -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Description / Perks</label>
                    <textarea id="plan-description" rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all shadow-sm resize-none" placeholder="Short description of the plan's main benefits..."></textarea>
                </div>
                
                <hr class="border-slate-100 my-6">

                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <p class="text-xs text-slate-500 font-medium max-w-sm">Changes take effect immediately on the live catalog.</p>
                    <button type="submit" id="submit-btn" class="px-8 py-3.5 bg-slate-900 text-white font-extrabold text-sm rounded-xl shadow-lg hover:bg-slate-800 transition-all flex items-center">
                        <span class="material-symbols-outlined text-[18px] mr-2">publish</span>
                        Publish Plan
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-4 px-6 lg:px-10 border-t border-slate-200 mt-auto bg-slate-100">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center text-[10px] uppercase font-bold tracking-widest text-slate-400">
            <p>Admin Control Panel</p>
            <p>Secure Connection Setup</p>
        </div>
    </footer>

    <script src="../js/global.js"></script>
    <script src="../js/admin-plans.js"></script>
</body>
</html>
