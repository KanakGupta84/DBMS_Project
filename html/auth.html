<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | InsureWise</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/global.css"/>
    <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body class="bg-white min-h-screen">
    
    <div class="auth-split fade-in-up">
        <!-- Sidebar Branding -->
        <div class="auth-sidebar relative overflow-hidden">
            <!-- decorative circles -->
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-slate-800 rounded-full mix-blend-multiply opacity-50 blur-2xl"></div>
            <div class="absolute top-1/2 -right-20 w-80 h-80 bg-blue-900 rounded-full mix-blend-multiply opacity-30 blur-2xl"></div>

            <div class="relative z-10 flex items-center space-x-3 text-white font-extrabold text-2xl tracking-tight uppercase group cursor-pointer" onclick="window.location.href='index.html'">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center transform transition-transform group-hover:rotate-12">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 8L16 12H8L12 8Z" fill="#0F172A"/>
                        <path d="M12 16L8 12H16L12 16Z" fill="#0F172A"/>
                    </svg>
                </div>
                <span>InsureWise</span>
            </div>


        </div>

        <!-- Auth Form -->
        <div class="auth-form-container">
            <div class="w-full max-w-sm auth-form-wrapper transition-all">
                <h1 id="auth-title" class="text-3xl font-extrabold text-slate-900 mb-2 tracking-tight">Welcome back</h1>
                <p id="auth-subtitle" class="text-slate-500 font-medium text-sm mb-8">Please enter your details to sign in.</p>

                <form autocomplete="off">
                    <div id="signup-fields" style="display: none;">
                        <div class="floating-input-group">
                            <input type="text" id="name" class="floating-input" placeholder=" " />
                            <label for="name" class="floating-label">Full Name</label>
                        </div>
                    </div>

                    <div class="floating-input-group">
                        <input type="email" id="email" class="floating-input" placeholder=" " required autocomplete="off" />
                        <label for="email" class="floating-label">Email Address</label>
                    </div>

                    <div class="floating-input-group">
                        <input type="password" id="password" class="floating-input" placeholder=" " required autocomplete="new-password" />
                        <label for="password" class="floating-label">Password</label>
                    </div>

                    <div class="flex items-center justify-between mb-8 mt-2">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-slate-900 focus:ring-slate-900 cursor-pointer"/>
                            <span class="ml-2 text-xs font-bold text-slate-600 group-hover:text-slate-900 transition-colors">Remember me</span>
                        </label>
                        <a href="#" class="text-xs font-bold text-slate-900 hover:underline">Forgot password?</a>
                    </div>

                    <button id="auth-submit" type="submit" class="w-full bg-slate-900 text-white font-extrabold text-sm py-3.5 rounded-xl shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all transform hover:-translate-y-0.5">
                        Sign In
                    </button>

                </form>

                <p id="toggle-auth-text" class="mt-8 text-center text-xs text-slate-500 font-medium">
                    Don't have an account? <a href="#" id="toggle-trigger" class="font-bold text-slate-900 hover:underline">Sign up for free</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="mt-8 py-4 border-t border-slate-200">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">© 2023 INSUREWISE FINANCIAL GROUP</div>
            <div class="flex gap-6 text-[10px] uppercase tracking-widest font-bold text-slate-400">
                <a class="hover:text-slate-900 transition-colors" href="#">Privacy</a>
                <a class="hover:text-slate-900 transition-colors" href="#">Terms</a>
                <a class="hover:text-slate-900 transition-colors" href="#">Security</a>
            </div>
        </div>
    </footer>

    <script src="../js/global.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
