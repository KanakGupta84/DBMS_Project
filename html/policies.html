<!-- Purchase Modal -->
<div id="purchase-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b border-slate-200">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-extrabold text-slate-900 uppercase tracking-wider" id="modal-title">Purchase Plan</h2>
                <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 transition-colors">
                    <span class="material-symbols-outlined text-slate-400">close</span>
                </button>
            </div>
            <p id="modal-subtitle" class="text-xs text-slate-500 mt-1 font-medium"></p>
        </div>

        <form id="purchase-form" class="p-6 space-y-4">
            <input type="hidden" id="modal-plan-id" />
            <input type="hidden" id="modal-plan-type" />

            <!-- ✅ NEW FIELD: POLICY EXPIRY DATE -->
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">
                    Policy Expiry Date *
                </label>
                <input 
                    type="date" 
                    id="end_date" 
                    required 
                    class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:ring-1 focus:ring-slate-900 focus:border-slate-900 outline-none"
                />
            </div>

            <!-- Health Fields -->
            <div id="health-fields" class="hidden space-y-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Patient Full Name *</label>
                    <input type="text" id="patient_name" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="date_of_birth" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                    <select id="blood_group" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm">
                        <option value="">Select</option>
                        <option>A+</option><option>A-</option>
                        <option>B+</option><option>B-</option>
                        <option>AB+</option><option>AB-</option>
                        <option>O+</option><option>O-</option>
                    </select>
                </div>
                <textarea id="pre_existing_conditions" rows="2" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm"></textarea>
            </div>

            <!-- Motor Fields -->
            <div id="motor-fields" class="hidden space-y-4">
                <input type="text" id="vehicle_number" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="vehicle_model" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                    <input type="number" id="registration_year" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                </div>
            </div>

            <!-- Life Fields -->
            <div id="life-fields" class="hidden space-y-4">
                <input type="text" id="nominee_name" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                <div class="grid grid-cols-2 gap-4">
                    <select id="nominee_relation" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm">
                        <option value="">Select</option>
                        <option>spouse</option>
                        <option>parent</option>
                        <option>child</option>
                    </select>
                    <input type="date" id="nominee_dob" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm" />
                </div>
            </div>

            <button type="submit" class="w-full py-3 bg-slate-900 text-white text-sm font-extrabold rounded-xl">
                Confirm Purchase
            </button>
        </form>
    </div>
</div>
