<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Policy Feedback | InsureWise</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@200;300;400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/global.css"/>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="global-header"></div>
    
    <main class="max-w-4xl mx-auto px-6 py-12">
        <!-- Header Section -->
        <div class="mb-10 text-center fade-in-up">
            <h1 class="text-3xl font-extrabold text-slate-900 mb-2">Policy Feedback</h1>
            <p class="text-slate-500 font-medium">Read what others say or share your own experience about <span id="policy-name-display" class="font-bold text-slate-900 border-b border-slate-900 pb-0.5">this policy</span>.</p>
        </div>

        <!-- Feedback Form -->
        <div class="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm mb-12 fade-in-up" style="animation-delay: 0.1s;">
            <h2 class="text-xl font-extrabold text-slate-900 mb-6">Leave Your Feedback</h2>
            
            <form id="feedback-form" class="space-y-6">
                <!-- Rating Selection -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-3">Rate this Policy (1-5)</label>
                    <div class="flex space-x-2" id="star-rating">
                        <button type="button" class="star-btn material-symbols-outlined text-slate-300 hover:text-amber-400 text-3xl transition-colors" data-value="1">star</button>
                        <button type="button" class="star-btn material-symbols-outlined text-slate-300 hover:text-amber-400 text-3xl transition-colors" data-value="2">star</button>
                        <button type="button" class="star-btn material-symbols-outlined text-slate-300 hover:text-amber-400 text-3xl transition-colors" data-value="3">star</button>
                        <button type="button" class="star-btn material-symbols-outlined text-slate-300 hover:text-amber-400 text-3xl transition-colors" data-value="4">star</button>
                        <button type="button" class="star-btn material-symbols-outlined text-slate-300 hover:text-amber-400 text-3xl transition-colors" data-value="5">star</button>
                    </div>
                    <input type="hidden" id="rating-value" required>
                </div>
                
                <!-- Feedback Text -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Your Experience</label>
                    <textarea id="feedback-text" rows="4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-slate-900 focus:ring-1 focus:ring-slate-900 text-sm outline-none transition-all shadow-sm resize-none" required placeholder="Tell us what you loved or what could be improved..."></textarea>
                </div>
                
                <button type="submit" id="submit-feedback-btn" class="px-8 py-3.5 bg-slate-900 text-white font-extrabold text-sm rounded-xl shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all">Submit Feedback</button>
            </form>

            <!-- Authentication Warning (hidden by default) -->
            <div id="auth-warning" class="hidden mt-4 p-4 bg-amber-50 text-amber-800 text-sm rounded-xl border border-amber-200 font-medium">
                Please <a href="auth.html" class="font-bold underline hover:text-amber-900">sign in</a> to leave feedback.
            </div>
        </div>


    </main>

    <footer class="mt-8 py-4 border-t border-slate-200">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">© 2023 INSUREWISE FINANCIAL GROUP</div>
            <div class="flex gap-6 text-[10px] uppercase tracking-widest font-bold text-slate-400">
                <a class="hover:text-slate-900 transition-colors" href="#">Privacy</a>
                <a class="hover:text-slate-900 transition-colors" href="#">Terms</a>
                <a class="hover:text-slate-900 transition-colors" href="#">Security</a>
            </div>
        </div>
    </footer>

    <script src="../js/global.js"></script>
    <script src="../js/feedback.js"></script>
</body>
</html>
